services:
  ajoti-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runner
    container_name: ajoti-backend-prod
    restart: unless-stopped
    env_file:
      - ../.env.prod
    ports:
      - "${AJOTI_BACKEND_PORT:-3000}:3000"
    depends_on:
      - postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node dist/main.js
      "