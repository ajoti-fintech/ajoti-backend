name: ajoti

services:
  postgres:
    image: postgres:16-alpine
    container_name: ajoti-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ajoti-redis
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "6388:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
