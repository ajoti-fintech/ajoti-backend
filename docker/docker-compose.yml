services:
  postgres:
    image: postgres:16-alpine
    container_name: ajoti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ajoti_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ajoti_password}
      POSTGRES_DB: ${POSTGRES_DB:-ajoti_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ajoti_user} -d ${POSTGRES_DB:-ajoti_db}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

volumes:
  postgres-data: