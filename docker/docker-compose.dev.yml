services:
  ajoti-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: ajoti-backend-dev
    restart: unless-stopped
    env_file:
      - ../.env.dev
    ports:
      - "${AJOTI_BACKEND_PORT:-3000}:3000"
    depends_on:
      - postgres:
        condition: service_healthy
    volumes:
      - ../:/app
      - /app/node_modules
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma migrate dev --name init --skip-seed &&
        pnpm run start:dev
      "

